<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#020617"/>
<title>🏀 NBA 人生模擬器</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#020617;height:100%;overflow:hidden;}
body{font-family:'Noto Sans TC','PingFang TC',system-ui,sans-serif;color:#e2e8f0;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;background:#020617;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.25);border-radius:2px;}
input,button{font-family:inherit;-webkit-appearance:none;}
button{-webkit-tap-highlight-color:transparent;cursor:pointer;}
.grad-text{background:linear-gradient(90deg,#f97316,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#header{background:linear-gradient(180deg,#0f172a,#0a1628);border-bottom:1px solid rgba(249,115,22,0.22);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50;}
#header-title{font-size:14px;font-weight:900;letter-spacing:1.5px;}
#header-sub{font-size:10px;color:#64748b;}
#header-btns{display:flex;gap:5px;align-items:center;margin-left:auto;}
.hbtn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:5px 9px;color:#94a3b8;font-size:12px;font-weight:700;}
.hbtn.active{background:rgba(249,115,22,0.2);border-color:#f97316;color:#f97316;}
.drawer{background:#0c1322;border-bottom:1px solid rgba(249,115,22,0.12);padding:14px 16px;overflow-y:auto;max-height:260px;}
#scroll{flex:1;overflow-y:auto;padding:14px 16px 24px;}
.stat-pill{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:3px 7px;}
.story-box{background:rgba(255,255,255,0.025);border:1px solid rgba(249,115,22,0.1);border-radius:14px;padding:17px 15px;margin-bottom:13px;white-space:pre-wrap;font-size:14px;line-height:1.95;color:#cbd5e1;}
.opt-btn{background:rgba(249,115,22,0.055);border:1.5px solid rgba(249,115,22,0.16);border-radius:12px;padding:12px 13px;color:#e2e8f0;text-align:left;font-size:14px;line-height:1.6;width:100%;display:flex;flex-direction:column;gap:7px;transition:background 0.12s,border-color 0.12s;min-height:52px;margin-bottom:7px;}
.opt-btn:active,.opt-btn.tapped{background:rgba(249,115,22,0.18);border-color:#f97316;}
.opt-key{background:#1e293b;color:white;border-radius:6px;padding:2px 8px;font-weight:800;font-size:12px;flex-shrink:0;transition:background 0.12s;}
.opt-btn.tapped .opt-key{background:#f97316;}
.delta-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:6px;font-size:11px;font-weight:700;line-height:1;flex-shrink:0;}
.dp{background:rgba(74,222,128,0.14);color:#4ade80;border:1px solid rgba(74,222,128,0.28);}
.dn{background:rgba(248,113,113,0.14);color:#f87171;border:1px solid rgba(248,113,113,0.28);}
#loading{text-align:center;padding:44px 0;display:none;}
#loading .ball{font-size:34px;animation:spin 0.85s linear infinite;display:inline-block;}
#loading p{font-size:11px;color:#475569;margin-top:12px;}
#free-toggle{background:transparent;border:1px dashed rgba(255,255,255,0.1);border-radius:9px;padding:9px 13px;color:#475569;font-size:12px;width:100%;text-align:center;margin-top:4px;display:none;}
#free-row{display:none;margin-top:8px;gap:7px;}
#free-row.show{display:flex;}
#free-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:11px 12px;color:#e2e8f0;font-size:14px;outline:none;}
#free-send{background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:10px;padding:11px 15px;color:white;font-weight:700;font-size:13px;flex-shrink:0;}
.stam-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.stam-label{font-size:12px;color:#94a3b8;width:52px;flex-shrink:0;}
.stam-track{flex:1;background:#1e293b;border-radius:3px;height:8px;overflow:hidden;}
.stam-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.stat-row{display:flex;align-items:center;gap:8px;min-width:0;margin-bottom:8px;}
.stat-label{font-size:12px;color:#94a3b8;width:58px;flex-shrink:0;}
.stat-track{flex:1;background:#1e293b;border-radius:3px;height:6px;overflow:hidden;}
.stat-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.stat-val{font-size:12px;font-weight:700;width:26px;text-align:right;flex-shrink:0;}
.setup-wrap{padding-top:24px;}
.prog-bar{display:flex;gap:6px;margin-bottom:24px;}
.prog-seg{flex:1;height:3px;border-radius:2px;background:#1e293b;transition:background 0.3s;}
.prog-seg.done{background:#f97316;}
.sel-btn{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 14px;color:#e2e8f0;text-align:left;width:100%;display:flex;flex-direction:column;gap:3px;margin-bottom:8px;transition:background 0.12s,border-color 0.12s;}
.sel-btn.selected{background:rgba(249,115,22,0.2);border-color:#f97316;}
.sel-title{font-weight:700;font-size:14px;}
.sel-desc{font-size:12px;color:#64748b;}
.primary-btn{background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:12px;padding:14px;color:white;font-size:15px;font-weight:800;width:100%;margin-top:4px;}
.primary-btn:disabled{background:#1e293b !important;}
.name-input{background:rgba(255,255,255,0.05);border:1px solid rgba(249,115,22,0.3);border-radius:12px;padding:14px 16px;color:#e2e8f0;font-size:16px;outline:none;width:100%;margin-bottom:10px;}
.api-input{background:rgba(255,255,255,0.05);border:1px solid rgba(249,115,22,0.3);border-radius:12px;padding:13px 16px;color:#e2e8f0;font-size:13px;outline:none;width:100%;margin-bottom:10px;letter-spacing:0.5px;}
.api-link{color:#38bdf8;text-decoration:none;}
#floating-delta{position:fixed;inset:0;z-index:1000;pointer-events:none;display:none;flex-direction:column;align-items:center;justify-content:center;gap:9px;}
.fdelta-item{background:rgba(2,6,23,0.93);border-radius:12px;padding:8px 22px;font-size:17px;font-weight:800;animation:floatUp 2s ease forwards;letter-spacing:1px;}
#ach-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;padding:24px;}
.ach-box{background:#0f172a;border:2px solid #fbbf24;border-radius:20px;padding:30px 20px;max-width:360px;width:100%;text-align:center;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes floatUp{0%{opacity:0;transform:translateY(22px) scale(0.85);}18%{opacity:1;transform:translateY(0) scale(1.07);}65%{opacity:1;transform:translateY(-9px) scale(1);}100%{opacity:0;transform:translateY(-46px) scale(0.9);}}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <span style="font-size:22px">🏀</span>
    <div style="flex:1;min-width:0">
      <div id="header-title" class="grad-text">NBA DREAM LIFE</div>
      <div id="header-sub">Gemini 獨立版</div>
    </div>
    <div id="header-btns" style="display:none">
      <span id="karma-hint" style="font-size:10px">☀️</span>
      <button class="hbtn" id="btn-stats" onclick="toggleDrawer('stats')">📊</button>
      <button class="hbtn" id="btn-hist"  onclick="toggleDrawer('hist')">📜</button>
    </div>
  </div>
  <div id="drawer-stats" class="drawer" style="display:none"><div id="stam-bar-wrap"></div><div id="stat-rows"></div></div>
  <div id="drawer-hist"  class="drawer" style="display:none"><div id="hist-list"><span style="font-size:12px;color:#475569">尚無記錄</span></div></div>
  <div id="scroll">
    <div id="apikey-screen" style="display:flex;flex-direction:column;align-items:center;padding:40px 0;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">🏀</div>
      <h1 style="font-size:22px;font-weight:900;margin-bottom:8px" class="grad-text">NBA 人生模擬器</h1>
      <p style="font-size:12px;color:#64748b;line-height:1.8;margin-bottom:16px">Gemini 獨立版 · 脫離 Claude 單獨使用<br/><span style="color:#f97316">⚠️ 含R18成人內容</span></p>
      <div style="font-size:12px;color:#64748b;line-height:1.9;margin-bottom:20px;background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.2);border-radius:10px;padding:14px 16px;width:100%">
        取得免費 Gemini API Key：<br/>
        <a class="api-link" href="https://aistudio.google.com/apikey" target="_blank">👉 aistudio.google.com/apikey</a><br/>
        （免費額度每分鐘60次，足夠遊戲使用）
      </div>
      <input id="apikey-input" class="api-input" type="password" placeholder="貼上你的 Gemini API Key" autocomplete="off"/>
      <button class="primary-btn" onclick="saveApiKey()" style="width:100%">確認並開始 →</button>
      <p style="font-size:10px;color:#334155;margin-top:12px">Key 只存在瀏覽器本地，不上傳伺服器</p>
      <button onclick="localStorage.removeItem('nba_gemini_key');document.getElementById('apikey-input').value=''" style="background:transparent;border:none;color:#475569;font-size:10px;margin-top:8px;text-decoration:underline">清除已儲存的 Key</button>
    </div>
    <div id="setup-screen" class="setup-wrap" style="display:none">
      <div class="prog-bar" id="prog-bar"></div>
      <div id="setup-content"></div>
    </div>
    <div id="game-screen" style="display:none">
      <div id="mini-strip" style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap"></div>
      <div id="loading"><div class="ball">🏀</div><p>Gemini 生成中...</p></div>
      <div id="story-box" class="story-box" style="display:none"></div>
      <div id="options-list"></div>
      <button id="free-toggle" onclick="toggleFree()">✏️ 自由輸入</button>
      <div id="free-row">
        <input id="free-input" placeholder="輸入你的行動..." onkeydown="if(event.key==='Enter')sendFree()"/>
        <button id="free-send" onclick="sendFree()">送</button>
      </div>
      <div id="bottom-anchor" style="height:16px"></div>
    </div>
  </div>
  <div id="floating-delta"></div>
  <div id="ach-modal">
    <div class="ach-box">
      <div style="font-size:52px;margin-bottom:12px">🏆</div>
      <div id="ach-title" style="font-size:20px;font-weight:900;color:#fbbf24;margin-bottom:8px;letter-spacing:1px"></div>
      <div id="ach-sub"   style="font-size:13px;color:#94a3b8;line-height:1.7"></div>
      <div id="ach-karma" style="margin-top:16px;font-size:12px;color:#64748b"></div>
      <button class="primary-btn" style="margin-top:20px;width:auto;padding:12px 28px" onclick="document.getElementById('ach-modal').style.display='none'">繼續 →</button>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT=`你是一個NBA籃球生涯模擬遊戲的GM。
每次訊息含玩家完整資料。
人生階段：童年→國小→國中→HBL高中→UBA大學→職業初期→巔峰→末期→退休
位置：PG智力型/SG爆發型/SF均衡/PF力量型/C禁區型
體力系統：DELTA中用stamina:-N標記消耗，歸零觸發傷病
業力系統（隱藏）：心裡追蹤，低業力劇情觸發懲罰，退休揭曉
格式（每次必須完整輸出）：
1) 📋[名字]|[階段]|[位置]|體力:[值]/100
2) 事件敘述120-200字繁體中文
3) 五選項：
【A】選項文字
DELTA: basketball:+5, stamina:-10
(B到E同格式)
DELTA規則：每項影響2~4數值+stamina，能力值±1~20，stamina -5~-25
4) ════ 📊狀態 ════
籃球技術:[值]|體能:[值]|心理:[值]|財富:[值]
感情:[值]|家庭:[值]|名氣:[值]|快樂:[值]|體力:[值]/100
台灣籃球文化真實（HBL/SBL/UBA/瓊斯盃），NBA真實名稱可用，R18暗示不露骨`;

const POSITIONS=[
  {key:"PG",label:"🎯 PG 控球後衛",desc:"智力型，傳球視野第一",bonuses:{mental:10,basketball:5}},
  {key:"SG",label:"🔥 SG 得分後衛",desc:"爆發型，得分機器",bonuses:{basketball:12}},
  {key:"SF",label:"⚡ SF 小前鋒",desc:"均衡型，全能戰士",bonuses:{basketball:6,physical:6}},
  {key:"PF",label:"💥 PF 大前鋒",desc:"力量型，籃板機器",bonuses:{physical:12,wealth:5}},
  {key:"C", label:"🏔️ C 中鋒",desc:"制霸禁區，名氣最慢",bonuses:{physical:15}},
];
const BACKGROUNDS=[
  {key:"athlete",label:"🏃 運動員家庭",desc:"父母是前運動員",bonuses:{physical:10,basketball:8},wealth:25},
  {key:"rich",   label:"💎 富裕家庭",desc:"家境優渥資源豐富",bonuses:{wealth:30,mental:5},wealth:60},
  {key:"poor",   label:"🔥 貧困街頭",desc:"從街頭打起韌性十足",bonuses:{mental:12,basketball:5},wealth:5},
  {key:"academic",label:"📚 學者家庭",desc:"讀書人家智力突出",bonuses:{mental:15},wealth:20},
  {key:"ordinary",label:"🏠 普通家庭",desc:"平凡出身一切靠自己",bonuses:{happiness:10,family:10},wealth:20},
];
const SMETA={
  basketball:{l:"🏀 籃球",c:"#f97316"},physical:{l:"💪 體能",c:"#ef4444"},
  mental:{l:"🧠 心理",c:"#a78bfa"},wealth:{l:"💰 財富",c:"#fbbf24"},
  romance:{l:"❤️ 感情",c:"#f472b6"},family:{l:"👨‍👩‍👧 家庭",c:"#34d399"},
  fame:{l:"🌟 名氣",c:"#38bdf8"},happiness:{l:"😊 快樂",c:"#a3e635"},
};

let apiKey="",playerName="",position=null,background=null;
let stats={},stamina=100,karma=50,round=0;
let history=[],conversation=[];
let setupStep=0,selPos=null,selBg=null,nameVal="";
let tappedOpt=null,freeOpen=false,sOpen=false,hOpen=false;

window.onload=()=>{ const k=localStorage.getItem("nba_gemini_key"); if(k){apiKey=k;showSetup();} };

function saveApiKey(){
  const k=document.getElementById("apikey-input").value.trim();
  if(!k||k.length<10){alert("請輸入有效的 Gemini API Key");return;}
  apiKey=k; localStorage.setItem("nba_gemini_key",k); showSetup();
}

function getGeminiHeaders(){
  const headers={"Content-Type":"application/json"};
  if(apiKey.startsWith("AQ.")){
    headers.Authorization=`Bearer ${apiKey}`;
  }else if(apiKey.startsWith("AIza")){
    headers["x-goog-api-key"]=apiKey;
  }else{
    headers["x-goog-api-key"]=apiKey;
  }
  return headers;
}

function showSetup(){
  document.getElementById("apikey-screen").style.display="none";
  document.getElementById("setup-screen").style.display="block";
  renderStep();
}

function renderStep(){
  const pb=document.getElementById("prog-bar");
  pb.innerHTML=[0,1,2].map(i=>`<div class="prog-seg${i<=setupStep?" done":""}"></div>`).join("");
  const c=document.getElementById("setup-content");
  if(setupStep===0){
    c.innerHTML=`<div style="text-align:center;margin-bottom:20px">
      <div style="font-size:48px;margin-bottom:8px">🏀</div>
      <h1 style="font-size:22px;font-weight:900;margin-bottom:6px" class="grad-text">NBA 人生模擬器</h1>
      <p style="font-size:12px;color:#64748b;line-height:1.8">位置系統 · 家庭背景 · 體力槽 · 隱藏業力 · 退休稱號</p>
    </div>
    <input class="name-input" id="name-inp" placeholder="輸入你的球員姓名..." oninput="nameVal=this.value" onkeydown="if(event.key==='Enter'&&nameVal.trim())nextStep()"/>
    <button class="primary-btn" onclick="nextStep()" ${nameVal.trim()?"":"disabled"}>選擇位置 →</button>`;
    // re-bind to track changes
    setTimeout(()=>{
      const ni=document.getElementById("name-inp");
      if(ni) ni.oninput=function(){nameVal=this.value; document.querySelector(".primary-btn").disabled=!nameVal.trim();};
    },0);
  } else if(setupStep===1){
    c.innerHTML=`<div style="font-size:14px;color:#94a3b8;margin-bottom:16px;text-align:center">🎯 選擇場上位置</div>
      ${POSITIONS.map(p=>`<button class="sel-btn${selPos?.key===p.key?" selected":""}" onclick="selPos=POSITIONS.find(x=>x.key==='${p.key}');renderStep()">
        <span class="sel-title">${p.label}</span><span class="sel-desc">${p.desc}</span>
        <div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">${Object.entries(p.bonuses).map(([k,v])=>dtag(v,SMETA[k]?.l.split(" ")[0])).join("")}</div>
      </button>`).join("")}
      <button class="primary-btn" onclick="nextStep()" ${selPos?"":"disabled"}>選擇背景 →</button>`;
  } else {
    c.innerHTML=`<div style="font-size:14px;color:#94a3b8;margin-bottom:16px;text-align:center">👨‍👩‍👧 選擇家庭背景</div>
      ${BACKGROUNDS.map(b=>`<button class="sel-btn${selBg?.key===b.key?" selected":""}" onclick="selBg=BACKGROUNDS.find(x=>x.key==='${b.key}');renderStep()">
        <span class="sel-title">${b.label}</span><span class="sel-desc">${b.desc}</span>
        <div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">${Object.entries(b.bonuses).map(([k,v])=>dtag(v,SMETA[k]?.l.split(" ")[0])).join("")}${dtag(b.wealth,"💰")}</div>
      </button>`).join("")}
      <button class="primary-btn" onclick="startGame()" ${selBg?"":"disabled"}>開始生涯 🏀</button>`;
  }
}

function nextStep(){ if(setupStep===0&&!nameVal.trim())return; setupStep++; renderStep(); }

function startGame(){
  if(!selBg)return;
  playerName=nameVal.trim(); position=selPos; background=selBg;
  stats={basketball:10,physical:10,mental:10,wealth:background.wealth,romance:5,family:50,fame:0,happiness:70};
  for(const[k,v]of Object.entries(position.bonuses))stats[k]=Math.min(100,(stats[k]||0)+v);
  for(const[k,v]of Object.entries(background.bonuses))stats[k]=Math.min(100,(stats[k]||0)+v);
  stamina=100;karma=50;round=0;
  document.getElementById("setup-screen").style.display="none";
  document.getElementById("game-screen").style.display="block";
  document.getElementById("header-btns").style.display="flex";
  updateHeader();
  callGemini(`我的名字是「${playerName}」，位置${position.key}，背景${background.key}。從台灣童年第一次接觸籃球開始，嚴格遵守格式輸出。`);
}

async function callGemini(msg){
  showLoad(true);
  document.getElementById("story-box").style.display="none";
  document.getElementById("options-list").innerHTML="";
  document.getElementById("free-toggle").style.display="none";
  document.getElementById("free-row").className="";
  freeOpen=false;tappedOpt=null;

  const ctx=`【玩家】名字:${playerName}|位置:${position.key}|背景:${background.key}|業力:${karma}（勿告知玩家）\n數值:${Object.entries(stats).map(([k,v])=>k+":"+v).join(",")}\n體力:${stamina}/100`;
  conversation.push({role:"user",parts:[{text:ctx+"\n\n"+msg}]});

  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`,{
      method:"POST",headers:getGeminiHeaders(),
      body:JSON.stringify({system_instruction:{parts:[{text:SYSTEM_PROMPT}]},contents:conversation,generationConfig:{maxOutputTokens:1200,temperature:0.95}})
    });
    const d=await r.json().catch(()=>({}));
    if(!r.ok||d.error){
      const msg=d.error?.message||r.statusText||"未知錯誤";
      showErr(`API錯誤（HTTP ${r.status}）：${msg}`);
      return;
    }
    const raw=d.candidates?.[0]?.content?.parts?.[0]?.text||"（回應錯誤）";
    conversation.push({role:"model",parts:[{text:raw}]});
    processResp(raw);
  }catch(e){showErr("連線錯誤："+e.message);}
}

function processResp(raw){
  showLoad(false);
  const sp={basketball:/籃球技術[：:]\s*(\d+)/,physical:/體能[：:]\s*(\d+)/,mental:/心理[：:]\s*(\d+)/,
    wealth:/財富[：:]\s*(\d+)/,romance:/感情[：:]\s*(\d+)/,family:/家庭[：:]\s*(\d+)/,
    fame:/名氣[：:]\s*(\d+)/,happiness:/快樂[：:]\s*(\d+)/};
  for(const[k,p]of Object.entries(sp)){const m=raw.match(p);if(m)stats[k]=Math.min(100,Math.max(0,+m[1]));}
  const sm=raw.match(/體力[：:]\s*(\d+)/);if(sm)stamina=Math.min(100,Math.max(0,+sm[1]));
  round++;
  if(raw.includes("退休")&&raw.includes("════"))triggerEnd();

  const opts=[];
  for(const blk of raw.split(/(?=【[A-E]】)/)){
    const hm=blk.match(/^【([A-E])】\s*(.+?)(?:\n|$)/);if(!hm)continue;
    const dm=blk.match(/DELTA:\s*([^\n]+)/i);const deltas={};
    if(dm)for(const p of dm[1].split(",")){const x=p.trim().match(/(\w+):\s*([+-]?\d+)/);if(x)deltas[x[1]]=+x[2];}
    opts.push({key:hm[1],label:hm[2].trim(),deltas});
  }

  const story=raw.replace(/📋[^\n]*\n?/,"").replace(/DELTA:[^\n]*/gi,"").replace(/【[A-E]】[^\n]*/g,"")
    .replace(/════[\s\S]*?體力[：:]\s*\d+[^\n]*/g,"").replace(/\n{3,}/g,"\n\n").trim();

  const sb=document.getElementById("story-box");
  sb.textContent=story;sb.style.display="block";

  const ol=document.getElementById("options-list");ol.innerHTML="";
  for(const opt of opts){
    const dp=Object.entries(opt.deltas).filter(([k])=>SMETA[k]||k==="stamina");
    const d=document.createElement("button");
    d.className="opt-btn";d.id="opt-"+opt.key;
    d.innerHTML<`<div style="display:flex;align-items:flex-start;gap:9px">
      <span class="opt-key">${opt.key}</span><span style="flex:1">${opt.label}</span></div>
      ${dp.length?`<div style="display:flex;gap:5px;flex-wrap:wrap;padding-left:2px">${dp.map(([k,v])=>dtag(v,k==="stamina"?"⚡":(SMETA[k]?.l.split(" ")[0]||""))).join("")}</div>`:""}`;
    d.onclick=()=>pickOpt(opt);
    ol.appendChild(d);
  }
  document.getElementById("free-toggle").style.display="block";
  updateHeader();renderStrip();renderStatRows();renderHist();
  document.getElementById("bottom-anchor").scrollIntoView({behavior:"smooth"});
}

function pickOpt(opt){
  if(tappedOpt)return;tappedOpt=opt.key;
  document.getElementById("opt-"+opt.key)?.classList.add("tapped");
  let kd=0;
  if(/假球|藥物|賭博|外遇|劈腿|踢走|欺騙/.test(opt.label))kd=-12;
  else if(/慈善|幫助|忠|道歉|支持/.test(opt.label))kd=8;
  karma=Math.min(100,Math.max(0,karma+kd));
  showFloat(opt.deltas);
  history.push({round,choice:`[${opt.key}] ${opt.label}`,deltas:opt.deltas});
  callGemini(`我選擇【${opt.key}】：${opt.label}`);
}

function sendFree(){
  const inp=document.getElementById("free-input");const msg=inp.value.trim();if(!msg)return;
  inp.value="";document.getElementById("free-row").className="";freeOpen=false;
  document.getElementById("free-toggle").textContent="✏️ 自由輸入";
  callGemini(msg);
}

function triggerEnd(){
  const b=stats.basketball||0,f=stats.fame||0,h=stats.happiness||0,fam=stats.family||0,w=stats.wealth||0;
  let t="台灣球員",s="完成了屬於$��的籃球旅程。";
  if(b>88&&f>85&&karma>65){t="🏆 籃球之神";s="技術、名氣、品格三者兼備。史書留名。";}
  else if(f>70&&karma>50&&history.length>12){t="🇹🇼 台灣之光";s="從台灣出發，讓世界看見你。";}
  else if(f>55&&karma<25){t="💥 醜聞球星";s="才華洋溢，卻逃不過業力反撲。";}
  else if(b>78&&f<35){t="👁️ 被遺忘的天才";s="能力從未被世人真正看見。";}
  else if(h>78&&fam>75){t="😊 快樂老爹";s="籃球不是全部，你找到了真正的幸福。";}
  else if(w<15){t="💸 破產傳奇";s="錢沒了，但故事流傳。";}
  else if(karma>70){t="🙏 球場君子";s="每一步走得坦蕩，業力帶來善終。";}
  document.getElementById("ach-title").textContent=t;
  document.getElementById("ach-sub").textContent=s;
  document.getElementById("ach-karma").textContent="業力揭曉："+(karma>65?"✨ 清白磊落":karma>35?"⚖️ 功過參半":"💀 業債纏身");
  document.getElementById("ach-modal").style.display="flex";
}

function dtag(v,icon){const p=v>0;return`<span class="delta-tag ${p?"dp":"dn"}">${icon||""}${p?"+"+v:v}</span>`;}
function showLoad(on){document.getElementById("loading").style.display=on?"block":"none";}
function showErr(m){showLoad(false);const sb=document.getElementById("story-box");sb.textContent="⚠️ "+m;sb.style.display="block";}
function updateHeader(){
  document.getElementById("header-sub").textContent=`${playerName} · ${position?.key||""} · 回合#${round}`;
  document.getElementById("karma-hint").textContent=karma>60?"☀️":karma>30?"🌥️":"⛈️";
}
function renderStrip(){
  const sc=stamina,col=sc>60?"#4ade80":sc>30?"#fbbf24":"#f87171";
  document.getElementById("mini-strip").innerHTML=
    `<div class="stat-pill"><span>⚡</span><span style="color:${col}">${sc}</span></div>`
    +Object.entries(SMETA).map(([k,m])=>`<div class="stat-pill"><span>${m.l.split(" ")[0]}</span><span style="color:${m.c}">${stats[k]||0}</span></div>`).join("");
}
function renderStatRows(){
  const sc=stamina,col=sc>60?"#4ade80":sc>30?"#fbbf24":"#f87171";
  document.getElementById("stam-bar-wrap").innerHTML=`<div class="stam-wrap"><span class="stam-label">⚡ 體力</span><div class="stam-track"><div class="stam-fill" style="width:${sc}%;background:${col}"></div></div><span class="stat-val" style="color:${col}">${sc}/100</span></div>`;
  document.getElementById("stat-rows").innerHTML=Object.entries(SMETA).map(([k,m])=>`<div class="stat-row"><span class="stat-label">${m.l}</span><div class="stat-track"><div class="stat-fill" style="width:${Math.min(100,Math.max(0,stats[k]||0))}%;background:${m.c}"></div></div><span class="stat-val" style="color:${m.c}">${stats[k]||0}</span></div>`).join("");
}
function renderHist(){
  if(!history.length){document.getElementById("hist-list").innerHTML<`<span style="font-size:12px;color:#475569">尚無記錄</span>`;return;}
  document.getElementById("hist-list").innerHTML=[...history].reverse().map(h=>`<div style="font-size:12px;color:#64748b;margin-bottom:9px;border-left:2px solid rgba(249,115,22,0.25);padding-left:9px"><div style="color:#94a3b8;margin-bottom:3px">#${h.round} ${h.choice}</div><div style="display:flex;gap:3px;flex-wrap:wrap">${Object.entries(h.deltas).map(([k,v])=>{const icon=k==="stamina"?"⚡":(SMETA[k]?.l.split(" ")[0]||"");return`<span style="font-size:9px;color:${v>0?"#4ade80":"#f87171"}">${icon}${v>0?"+"+v:v}</span>`;}).join("")}</div></div>`).join("");
}
function toggleDrawer(w){
  if(w==="stats"){sOpen=!sOpen;hOpen=false;if(sOpen)renderStatRows();}
  else{hOpen=!hOpen;sOpen=false;if(hOpen)renderHist();}
  document.getElementById("drawer-stats").style.display=sOpen?"block":"none";
  document.getElementById("drawer-hist").style.display=hOpen?"block":"none";
  document.getElementById("btn-stats").className="hbtn"+(sOpen?" active":"");
  document.getElementById("btn-hist").className="hbtn"+(hOpen?" active":"");
}
function toggleFree(){
  freeOpen=!freeOpen;
  document.getElementById("free-row").className=freeOpen?"show":"";
  document.getElementById("free-toggle").textContent=freeOpen?"▲ 收起":"✏️ 自由輸入";
  if(freeOpen)setTimeout(()=>document.getElementById("free-input").focus(),50);
}
function showFloat(deltas){
  const fd=document.getElementById("floating-delta");
  fd.innerHTML=Object.entries(deltas).filter(([k])=>SMETA[k]||k==="stamina").map(([k,v])=>{
    const icon=k==="stamina"?"⚡":(SMETA[k]?.l.split(" ")[0]||"");
    const name=k==="stamina"?"體力":(SMETA[k]?.l.split(" ").slice(1).join(" ")||k);
