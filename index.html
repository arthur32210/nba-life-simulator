<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#020617;height:100%;overflow:hidden;}
body{font-family:'Noto Sans TC','PingFang TC',system-ui,sans-serif;color:#e2e8f0;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;background:#020617;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.25);border-radius:2px;}
input,button{font-family:inherit;-webkit-appearance:none;}
button{-webkit-tap-highlight-color:transparent;cursor:pointer;}
.grad-text{background:linear-gradient(90deg,#f97316,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#header{background:linear-gradient(180deg,#0f172a,#0a1628);border-bottom:1px solid rgba(249,115,22,0.22);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50;}
#header-title{font-size:14px;font-weight:900;letter-spacing:1.5px;}
#header-sub{font-size:10px;color:#64748b;}
#header-btns{display:flex;gap:5px;align-items:center;margin-left:auto;}
.hbtn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:5px 9px;color:#94a3b8;font-size:12px;font-weight:700;}
.hbtn.active{background:rgba(249,115,22,0.2);border-color:#f97316;color:#f97316;}
.drawer{background:#0c1322;border-bottom:1px solid rgba(249,115,22,0.12);padding:14px 16px;overflow-y:auto;max-height:260px;}
#scroll{flex:1;overflow-y:auto;padding:14px 16px 24px;}
.stat-pill{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:3px 7px;}
.story-box{background:rgba(255,255,255,0.025);border:1px solid rgba(249,115,22,0.1);border-radius:14px;padding:17px 15px;margin-bottom:13px;white-space:pre-wrap;font-size:14px;line-height:1.95;color:#cbd5e1;}
.opt-btn{background:rgba(249,115,22,0.055);border:1.5px solid rgba(249,115,22,0.16);border-radius:12px;padding:12px 13px;color:#e2e8f0;text-align:left;font-size:14px;line-height:1.6;width:100%;display:flex;flex-direction:column;gap:7px;transition:background 0.12s,border-color 0.12s;min-height:52px;margin-bottom:7px;}
.opt-btn:active,.opt-btn.tapped{background:rgba(249,115,22,0.18);border-color:#f97316;}
.opt-key{background:#1e293b;color:white;border-radius:6px;padding:2px 8px;font-weight:800;font-size:12px;flex-shrink:0;transition:background 0.12s;}
.opt-btn.tapped .opt-key{background:#f97316;}
.delta-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:6px;font-size:11px;font-weight:700;line-height:1;flex-shrink:0;}
.dp{background:rgba(74,222,128,0.14);color:#4ade80;border:1px solid rgba(74,222,128,0.28);}
.dn{background:rgba(248,113,113,0.14);color:#f87171;border:1px solid rgba(248,113,113,0.28);}
#loading{text-align:center;padding:44px 0;display:none;}
#loading .ball{font-size:34px;animation:spin 0.85s linear infinite;display:inline-block;}
#loading p{font-size:11px;color:#475569;margin-top:12px;}
#free-toggle{background:transparent;border:1px dashed rgba(255,255,255,0.1);border-radius:9px;padding:9px 13px;color:#475569;font-size:12px;width:100%;text-align:center;margin-top:4px;display:none;}
#free-row{display:none;margin-top:8px;gap:7px;}
#free-row.show{display:flex;}
#free-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:11px 12px;color:#e2e8f0;font-size:14px;outline:none;}
#free-send{background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:10px;padding:11px 15px;color:white;font-weight:700;font-size:13px;flex-shrink:0;}
.stam-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.stam-label{font-size:12px;color:#94a3b8;width:52px;flex-shrink:0;}
.stat-row{display:flex;align-items:center;gap:8px;min-width:0;margin-bottom:8px;}
.stat-label{font-size:12px;color:#94a3b8;width:70px;flex-shrink:0;}
.stat-track{flex:1;background:#1e293b;border-radius:3px;height:6px;overflow:hidden;}
.stat-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.stat-val{font-size:12px;font-weight:700;width:26px;text-align:right;flex-shrink:0;}
.setup-wrap{padding-top:24px;}
.prog-bar{display:flex;gap:6px;margin-bottom:24px;}
.prog-seg{flex:1;height:3px;border-radius:2px;background:#1e293b;transition:background 0.3s;}
.prog-seg.done{background:#f97316;}
.sel-btn{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 14px;color:#e2e8f0;text-align:left;width:100%;display:flex;flex-direction:column;gap:3px;margin-bottom:8px;transition:background 0.12s,border-color 0.12s;}
.sel-btn.selected{background:rgba(249,115,22,0.2);border-color:#f97316;}
.sel-title{font-weight:700;font-size:14px;}
.sel-desc{font-size:12px;color:#64748b;}
.primary-btn{background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:12px;padding:14px;color:white;font-size:15px;font-weight:800;width:100%;margin-top:4px;}
.primary-btn:disabled{background:#1e293b !important;}
.name-input{background:rgba(255,255,255,0.05);border:1px solid rgba(249,115,22,0.3);border-radius:12px;padding:14px 16px;color:#e2e8f0;font-size:16px;outline:none;width:100%;margin-bottom:10px;}
.api-input{background:rgba(255,255,255,0.05);border:1px solid rgba(249,115,22,0.3);border-radius:12px;padding:13px 16px;color:#e2e8f0;font-size:13px;outline:none;width:100%;margin-bottom:10px;letter-spacing:0.5px;}
.api-link{color:#38bdf8;text-decoration:none;}
#floating-delta{position:fixed;inset:0;z-index:1000;pointer-events:none;display:none;flex-direction:column;align-items:center;justify-content:center;gap:9px;}
#ach-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;padding:24px;}
.ach-box{background:#0f172a;border:2px solid #fbbf24;border-radius:20px;padding:30px 20px;max-width:360px;width:100%;text-align:center;}
.sect-divider{font-size:11px;color:#475569;margin:10px 0 6px;text-align:center;letter-spacing:1px;}
#headline-bar{display:none;margin-bottom:8px;padding:6px 10px;background:rgba(56,189,248,0.07);border:1px solid rgba(56,189,248,0.18);border-radius:8px;font-size:11px;color:#7dd3fc;line-height:1.5;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes floatUp{0%{opacity:0;transform:translateY(22px) scale(0.85);}18%{opacity:1;transform:translateY(0) scale(1.07);}65%{opacity:1;transform:translateY(-9px) scale(1);}100%{opacity:0;transform:translateY(-46px) scale(0.9);}}
</style>
</head>
<body>

<script>
const SYSTEM_PROMPT=`你是台灣 NBA 文字人生模擬器的 GM，用繁體中文創作。

【核心身份】
你不是報告機器，你是文字人生模擬器 GM。
每回合故事正文只寫 120～220 字。句子短，有台灣語感。
不要先列數值。不要在故事正文出現 DELTA、狀態表、格式說明。
故事要像玩家正在經歷人生，不是旁白摘要。

【每回合輸出結構】
1. 📋 狀態 header（包含 DELTA 標記）
2. 📰 媒體頭條（可選，重要事件才出現）
3. 劇情正文 120～220 字
4. 「你會怎麼做？」
5. 五個選項【A】至【E】
6. ════ 📊狀態 ════

【劇情正文規則】
每回合至少包含其中 2 個元素：
- 具體場景：球場、教室、休息室、家裡、球探面談、媒體訪問
- 情緒壓力：緊張、不甘心、興奮、害怕受傷、想證明自己
- 人物互動：教練、隊友、家人、球探、經紀人、女友、媒體
- 明確衝突：上場時間、受傷風險、學業、家庭期待、球隊地位、金錢誘惑
- 上回合後果：延續玩家上一個選擇造成的影響
禁止寫流水帳。禁止「你去練球」這種空洞句子。

【選項規則】
每個選項要有代價，不只是行動描述：
【A】保守穩健，成長慢但安全
【B】冒險拚搏，壓力或傷病上升
【C】人際╱家庭╱感情選項
【D】媒體╱名氣╱金錢誘惑
【E】冷門或高風險，可能帶來意外劇情
每個選項後面一定要有 DELTA 行。格式：
【A】選項文字
DELTA: basketball:+2,stamina:-8,coach:+2
嚴禁使用 A. B. A、 等格式。

【節奏規則】
round 1-10：童年啟蒙，要有第一次被看見、第一次挫折、家庭選擇
round 11-30：校隊競爭、教練偏心、同儕壓力
round 31-60：HBL╱UBA，球探、升學、受傷、爆紅
round 61-120：職業初期，板凳、交易、媒體、合約
round 121-170：巔峰期，季後賽、明星賽、代言、總冠軍壓力
round 171-200：老化、傷病、家庭、傳承、退休
每 5 回合至少一次明顯轉折。每 20 回合至少一次人生重大事件。
不要讓童年拖太久。

【最近選擇】
context 裡有玩家最近的選擇，請讓劇情延續那些決定的後果。

【格式規定】選項必須用【A】至【E】，每選項後接 DELTA: 行。嚴禁 A. B. A、 等格式。`;

const POSITIONS=[
  {key:"PG",label:"🎯 PG 控球後衛",desc:"智力型，傳球視野第一",bonuses:{mental:10,basketball:5}},

const MILESTONE_DEF=[
  {id:"童年初登場",label:"🏀 童年初登場",cond:r=>r.round>=1,minRound:1},
  {id:"國中校隊",label:"🏫 國中校隊入選",cond:r=>r.round>=6,minRound:6},

const ACH_DEF=[
  {id:"HBL英雄",icon:"🏫",label:"HBL英雄",check:()=>milestones.includes("HBL關鍵戰")&&stats.basketball>=45},
  {id:"選秀黑馬",icon:"🌟",label:"選秀黑馬",check:()=>milestones.includes("選秀夜")&&stats.fame>=25},

  {id:"媒體寵兒",icon:"📺",label:"媒體寵兒",check:()=>media>=70},

function updateHiddenFlags(label,deltas){
  if(/挑戰|對決|嗆|競爭|單挑/.test(label))hiddenFlags.rival++;
  if(/教練|上場時間|頂撞/.test(label))hiddenFlags.coachConflict++;
  if(/家人|父母|家庭|回家/.test(label))hiddenFlags.familyPressure++;
  if((deltas.stamina||0)<-15||(deltas.injuryRisk||0)>0)hiddenFlags.injurySeed++;
  if((deltas.media||0)>0||(deltas.fame||0)>0)hiddenFlags.mediaHeat++;
  if(/球探|招募|試訓|選秀/.test(label))hiddenFlags.scoutInterest++;
  if(/感情|女友|曖昧|約會/.test(label))hiddenFlags.loveInterest++;
  if(/錢|代言|合約|夜店|誘惑/.test(label))hiddenFlags.moneyTemptation++;
}
function getEventDirective(){
  const r=round+1;
  const directives=[];
  if(r<=5){directives.push("童年啟蒙：第一次在球場被注意、第一次被電爆、或父母質疑你太沉迷籃球。");}
  else if(r<=15){directives.push("校隊競爭：選拔、教練偏心、同儕壓力、第一次關鍵球。");}
  else if(r<=30){directives.push("HBL前期：名校招募、隊友競爭、訓練與學業衝突、受傷前兆。");}
  else if(r<=60){directives.push("HBL/UBA/海外：球探注意、升學選擇、爆紅、受傷、家庭期待。");}
  else if(r<=120){directives.push("職業初期：板凳、交易流言、媒體壓力、合約、角色定位。");}
  else if(r<=170){directives.push("州峰期：明星賽、季後賽、總冠軍、代言、球隊核心壓力。");}
  else{directives.push("生涯後期：老化、傷病、家庭、傳承、是否退休。");}
  if(r%5===0)directives.push("本回合必須發生小轉折。");
  if(r%20===0)directives.push("本回合必須發生人生重大事件。");
  if(hiddenFlags.rival>=2)directives.push("延續宿敵線：安排競爭者或對決壓力。");
  if(hiddenFlags.coachConflict>=2)directives.push("延續教練衝突線：上場時間或信任危機。");
  if(hiddenFlags.familyPressure>=2)directives.push("延續家庭壓力線：家人對籃球路提出質疑或支持。");
  if(hiddenFlags.injurySeed>=2)directives.push("延續傷病伏筆：身體出現警訊，但仍有上場誘惑。");
  if(hiddenFlags.mediaHeat>=2)directives.push("延續媒體線：爆紅、酸民、採訪或公關壓力。");
  if(hiddenFlags.scoutInterest>=2)directives.push("延續球探線：招募、試訓、排名或選秀討論。");
  if(hiddenFlags.moneyTemptation>=2)directives.push("延續金錢誘惑線：代言、夜生活、合約或風險選擇。");
  return directives.join(" ");
}
function updateNarrativeSummary(raw){

function applyAging(){
  if(round<140)return;
  const agePenalty=Math.floor((round-140)/15)+1;
  stats.physical=Math.max(0,(stats.physical||0)-agePenalty);
  injuryRisk=Math.min(100,injuryRisk+agePenalty);
  stress=Math.min(100,stress+Math.max(1,Math.floor(agePenalty/2)));
  if(round>=170){
    stamina=Math.min(stamina,85);
    stamina=Math.max(0,stamina-agePenalty);
  }
  if(round>=190){
    stamina=Math.min(stamina,75);
    stats.physical=Math.min(stats.physical||0,85);
    injuryRisk=Math.max(injuryRisk,40);
  }
}

const GEMINI_MODELS=["gemini-2.0-flash-lite","gemini-2.0-flash","gemini-2.5-flash"];
async function callGemini(msg,retryPolish=false){
  lastUserMsg=msg;
  showLoad(true);
  document.getElementById("story-box").style.display="none";
  document.getElementById("options-list").innerHTML="";
  document.getElementById("free-toggle").style.display="none";
  document.getElementById("free-row").className="";
  freeOpen=false;tappedOpt=null;
  const ctx=`【玩家】名字:${playerName}|位置:${position.key}|背景:${background.key}|業力:${karma}（勿告知玩家）\n數値:${Object.entries(stats).map(([k,v])=>k+":"+v).join(",")}\n體力:${stamina}/100\n最近三次選擇:${history.filter(h=>h.choice).slice(-3).map(h=>h.choice).join(" / ")||"無"}\n本回合事件指令:${getEventDirective()}\n人生摘要:${narrativeSummary||"無"}`;
  conversation.push({role:"user",parts:[{text:ctx+"\n\n"+msg}]});
  try{
    const resp=await fetch("/api/gemini",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        password:gamePassword,
        system_instruction:{parts:[{text:SYSTEM_PROMPT}]},
        contents:conversation.slice(-12),
        generationConfig:{maxOutputTokens:900,temperature:0.9}
      })
    });
    const data=await resp.json().catch(()=>({}));
    if(data.error==="INVALID_PASSWORD"){
      conversation.pop();
      localStorage.removeItem("nba_game_password");
      gamePassword="";
      document.getElementById("game-screen").style.display="none";
      document.getElementById("setup-screen").style.display="none";
      document.getElementById("apikey-screen").style.display="flex";
      failWithError("遊戲密碼錯誤，請重新輸入。");
      return;
    }
    if(data.error==="GEMINI_AUTH_ERROR"||data.error==="MISSING_GEMINI_API_KEY"){
      conversation.pop();
      failWithError(data.message||"Gemini API 設定錯誤");
      return;
    }
    if(!resp.ok){
      conversation.pop();
      failWithError("Gemini 目前忙碌，請稍後再按「重試本回合」。");
      return;
    }
    const _raw=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
    if(!_raw){
      conversation.pop();
      failWithError("Gemini 目前忙碌，請稍後再按「重試本回合」。");
      return;
    }
    const _storyCandidate=_raw.replace(/📋[\s\S]*?(?=\n\n)/,"").replace(/═{4}[\s\S]*/,"").trim();
    const _hasOpts=/【[A-E]】/.test(_raw);
    const _hasQ=/你會怎麼做/.test(_raw);
    if(!retryPolish&&(_storyCandidate.length<80||!_hasQ||!_hasOpts)){
      conversation.pop();
      return callGemini(msg+"\n\n請重寫。這不是狀態報告，要像文字人生模擬器：有場景、衝突、情緒、五個【A】到【E】選項，每個選項含 DELTA。",true);
    }
    conversation.push({role:"model",parts:[{text:_raw}]});
    round++;
    updateNarrativeSummary(_raw);
    processResp(_raw);
  }catch(e){
    conversation.pop();
    failWithError("Gemini 目前忙碌，請稍後再按「重試本回合」。");
  }
}
function processResp(raw){
  showLoad(false);
  const sp={
    basketball:/籃球技術[：:]\s*(\d+)/,physical:/體能[：:]\s*(\d+)/,
    mental:/心理[：:]\s*(\d+)/,wealth:/財富[：:]\s*(\d+)/,
    romance:/感情[：:]\s*(\d+)/,family:/家庭[：:]\s*(\d+)/,
    fame:/名氣[：:]\s*(\d+)/,happiness:/快樂[：:]\s*(\d+)/
  };
  for(const[k,p]of Object.entries(sp)){const m=raw.match(p);if(m)stats[k]=Math.min(100,Math.max(0,+m[1]));}
  const sm=raw.match(/體力[：:]\s*(\d+)/);if(sm)stamina=Math.min(100,Math.max(0,+sm[1]));
  const stressM=raw.match(/壓力[：:]\s*(\d+)/);if(stressM)stress=Math.min(100,Math.max(0,+stressM[1]));
  const injM=raw.match(/傷病風險[：:]\s*(\d+)/);if(injM)injuryRisk=Math.min(100,Math.max(0,+injM[1]));
  const medM=raw.match(/媒體風評[：:]\s*(\d+)/);if(medM)media=Math.min(100,Math.max(0,+medM[1]));
  const rp={
    coach:/教練信任[：:]\s*(\d+)/,teammates:/隊友情誼[：:]\s*(\d+)/,
    fans:/球迷支持[：:]\s*(\d+)/,familyRel:/家人關係[：:]\s*(\d+)/,
    partner:/感情關係[：:]\s*(\d+)/,agent:/經紀人能力[：:]\s*(\d+)/
  };
  for(const[k,p]of Object.entries(rp)){const m=raw.match(p);if(m)relations[k]=Math.min(100,Math.max(0,+m[1]));}
  round++;
updateNarrativeSummary(raw);

  // Extract headline
  const hlM=raw.match(/📰\s*媒體頭條[：:]\s*([^\n]+)/);
  if(hlM){
    const hl=hlM[1].trim();
    headlines.unshift(hl);
    if(headlines.length>10)headlines.pop();
    const hbar=document.getElementById("headline-bar");
    hbar.textContent="📰 "+hl;
    hbar.style.display="block";
  }

  checkMilestones();
  checkAchievements();

  applyAging();
  const explicitRetire=/退休(演說|結局|結算|典禮|名人堂|正式退休)/.test(raw);


  const opts=[];
  const optRegex=/(?:【([A-E])】|(?:^|\n)([A-E])[\.\u3001)]\s*)(.+?)(?=\n(?:【[A-E]】|[A-E][\.\u3001)]\s)|\n════|$)/gs;
  for(const m of raw.matchAll(optRegex)){
    const key=m[1]||m[2];
    const block=m[0];
    const label=(m[3]||"").split("\n")[0].trim();
    const dm=block.match(/DELTA:\s*([^\n]+)/i);const deltas={};
    if(dm){for(const pt of dm[1].split(",")){const x=pt.trim().match(/(\w+):\s*([+-]?\d+)/);if(x)deltas[x[1]]=+x[2];}}
    if(key&&label)opts.push({key,label,deltas});
  }
  const storyEnd=raw.indexOf("════");
let storyRaw=storyEnd>-1?raw.slice(0,storyEnd):raw;
storyRaw=storyRaw
    .replace(/(?:【[A-E]】|\n[A-E][\.\u3001)]\s)[\s\S]*?(?=\n(?:【[A-E]】|[A-E][\.\u3001)]\s)|\n════|$)/g,"")
    .replace(/\uD83D\uDCCB[\s\S]*?(?=\n\n|\u7B2C\s*\d+\s*\u56DE\u5408|\u7AE5\u5E74|\u570B\u5C0F|\u570B\u4E2D|HBL|UBA|NBA|\u4ECA\u5929|\u9019\u4E00\u5929)/,"")
    .replace(/\uD83D\uDCF0[^\n]*/g,"")
    .replace(/DELTA:[^\n]*/gi,"")
    .replace(/\n{3,}/g,"\n\n")
    .replace(/^[^\n]*\|[^\n]*\n?/gm,"")
    .replace(/^(感情|壓力|教練信任|家人關係)[^\n]*\n?/gm,"")
    .trim();

  const sb=document.getElementById("story-box");
  sb.textContent=storyRaw;sb.style.display="block";

  const ol=document.getElementById("options-list");ol.innerHTML="";
  for(const opt of opts){
    const dp=Object.entries(opt.deltas).filter(([k])=>SMETA[k]||EMETA[k]||RELMETA[k]||k==="stamina");
    const btn=document.createElement("button");
    btn.className="opt-btn";btn.id="opt-"+opt.key;
    btn.innerHTML=`<div style="display:flex;align-items:flex-start;gap:9px">
      <span class="opt-key">${opt.key}</span><span style="flex:1">${opt.label}</span></div>
      ${dp.length?`<div style="display:flex;gap:5px;flex-wrap:wrap;padding-left:2px">${dp.map(([k,v])=>{const icon=k==="stamina"?"⚡":SMETA[k]?SMETA[k].l.split(" ")[0]:EMETA[k]?EMETA[k].l.split(" ")[0]:RELMETA[k]?RELMETA[k].l.split(" ")[0]:"";return dtag(v,icon);}).join("")}</div>`:""}`;
    btn.onclick=()=>pickOpt(opt);
    ol.appendChild(btn);
  }
  document.getElementById("free-toggle").style.display="block";
  updateHeader();renderStrip();renderStatRows();renderHist();
  if(shouldForceRetire()||explicitRetire){document.getElementById("options-list").innerHTML="";document.getElementById("free-toggle").style.display="none";triggerEnd();return;}
  document.getElementById("bottom-anchor").scrollIntoView({behavior:"smooth"});
}

function checkMilestones(){
  for(const m of MILESTONE_DEF){
    if(!milestones.includes(m.id)&&round>=m.minRound){
      milestones.push(m.id);
      history.push({round,milestone:true,label:m.label,desc:m.desc});
      showAchToast(m.label);
    }
  }
}

function checkAchievements(){
  for(const a of ACH_DEF){
    if(!achievements.includes(a.id)&&a.check()){
      achievements.push(a.id);
      history.push({round,achievement:true,label:a.icon+" "+a.label});
      showAchToast("🏆 解鎖成就："+a.label);
    }
  }
}

function showAchToast(msg){
  const el=document.createElement("div");
  el.style.cssText="position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#0f172a;border:1.5px solid #fbbf24;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:700;color:#fbbf24;z-index:500;pointer-events:none;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden";
  el.textContent=msg;
  document.body.appendChild(el);
  el.style.animation="floatUp 2.5s ease forwards";
  setTimeout(()=>{ if(el.parentNode)el.parentNode.removeChild(el); },2500);
}

function pickOpt(opt){
  if(tappedOpt)return;tappedOpt=opt.key;
  const ob=document.getElementById("opt-"+opt.key);
  if(ob)ob.classList.add("tapped");
  let kd=0;
  if(/假球|藥物|賭博|外遇|劈腿|踢走|欺騙/.test(opt.label))kd=-12;
  else if(/慈善|幫助|忠|道歉|支持/.test(opt.label))kd=8;
  karma=Math.min(100,Math.max(0,karma+kd));
  showFloat(opt.deltas);
  history.push({round,choice:`[${opt.key}] ${opt.label}`,deltas:opt.deltas});
  updateHiddenFlags(opt.label,opt.deltas);
  callGemini(`我選擇【${opt.key}】：${opt.label}`);
}

function sendFree(){
  const inp=document.getElementById("free-input");const msg=inp.value.trim();if(!msg)return;
  inp.value="";document.getElementById("free-row").className="";freeOpen=false;
  document.getElementById("free-toggle").textContent="✏️ 自由輸入";
  callGemini(msg);
}

function triggerEnd(){
  const b=stats.basketball||0,f=stats.fame||0,h=stats.happiness||0,fam=stats.family||0,w=stats.wealth||0;
  let t="台灣球員",s="完成了屬於你的籃球旅程。";
  if(b>88&&f>85&&karma>65){t="🏆 籃球之神";s="技術、名氣、品格三者兼備。史書留名。";}
  else if(f>70&&karma>50&&history.length>12){t="🇹🇼 台灣之光";s="從台灣出發，讓世界看見你。";}
  else if(f>55&&karma<25){t="💥 醜聞球星";s="才華洋溢，卻逃不過業力反撲。";}
  else if(b>78&&f<35){t="👁️ 被遺忘的天才";s="能力從未被世人真正看見。";}
  else if(h>78&&fam>75){t="😊 快樂老爹";s="籃球不是全部，你找到了真正的幸福。";}
  else if(w<15){t="💸 破產傳奇";s="錢沒了，但故事流傳。";}
  else if(karma>70){t="🙏 球場君子";s="每一步走得坦蕩，業力帶來善終。";}
  document.getElementById("ach-title").textContent=t;
  document.getElementById("ach-sub").textContent=s;
  document.getElementById("ach-karma").textContent="業力揭曉："+(karma>65?"✨ 清白磊落":karma>35?"⚖️ 功過參半":"💀 業債纏身");
  document.getElementById("ach-modal").style.display="flex";
}

function dtag(v,icon){const p=v>0;return`<span class="delta-tag ${p?"dp":"dn"}">${icon||""}${p?"+"+v:v}</span>`;}
function showLoad(on){document.getElementById("loading").style.display=on?"block":"none";}
function showErr(m){showLoad(false);const sb=document.getElementById("story-box");sb.textContent="⚠️ "+m;sb.style.display="block";if(lastUserMsg){const btn=document.createElement("button");btn.textContent="🔁 重試本回合";btn.onclick=function(){callGemini(lastUserMsg);};btn.style.cssText="display:block;margin-top:8px;padding:6px 14px;background:#f97316;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;";sb.appendChild(btn);}}
function failWithError(m){conversation.pop();showErr(m);}
function updateHeader(){
  document.getElementById("header-sub").textContent=playerName?(playerName+" · "+(position?position.key:"")+" · "+getCurrentStage()+" · 回合#"+round+"/200"):"Gemini 獨立版";
  document.getElementById("karma-hint").textContent=karma>60?"☀️":karma>30?"🌥️":"⛈️";
}


function renderStrip(){
  const sc=stamina,col=sc>60?"#4ade80":sc>30?"#fbbf24":"#f87171";
  const col2=stress>80?"#f87171":stress>50?"#fbbf24":"#4ade80";
  const col3=injuryRisk>75?"#f87171":injuryRisk>40?"#fbbf24":"#4ade80";
  const col4=media>60?"#38bdf8":media>30?"#fbbf24":"#f87171";
  document.getElementById("mini-strip").innerHTML=
    `<div class="stat-pill"><span>⚡</span><span style="color:${col}">${sc}</span></div>`+
    `<div class="stat-pill"><span>😰</span><span style="color:${col2}">${stress}</span></div>`+
    `<div class="stat-pill"><span>🩹</span><span style="color:${col3}">${injuryRisk}</span></div>`+
    `<div class="stat-pill"><span>📰</span><span style="color:${col4}">${media}</span></div>`+
    `<div class="stat-pill"><span>🏀</span><span style="color:#f97316">${stats.basketball||0}</span></div>`+
    `<div class="stat-pill"><span>🌟</span><span style="color:#38bdf8">${stats.fame||0}</span></div>`;
}

function renderStatRows(){
  const sc=stamina,col=sc>60?"#4ade80":sc>30?"#fbbf24":"#f87171";
  document.getElementById("stam-bar-wrap").innerHTML=`<div class="stam-wrap"><span class="stam-label">⚡ 體力</span><div class="stat-track" style="height:8px"><div class="stat-fill" style="width:${sc}%;background:${col}"></div></div><span class="stat-val" style="color:${col}">${sc}/100</span></div>`;
  let html=Object.entries(SMETA).map(([k,m])=>`<div class="stat-row"><span class="stat-label">${m.l}</span><div class="stat-track"><div class="stat-fill" style="width:${Math.min(100,Math.max(0,stats[k]||0))}%;background:${m.c}"></div></div><span class="stat-val" style="color:${m.c}">${stats[k]||0}</span></div>`).join("");
  html+=`<div class="sect-divider">── 壓力・傷病・媒體 ──</div>`;
  const col2=stress>80?"#f87171":stress>50?"#fbbf24":"#4ade80";
  const col3=injuryRisk>75?"#f87171":injuryRisk>40?"#fbbf24":"#4ade80";
  const col4=media>60?"#38bdf8":media>30?"#fbbf24":"#f87171";
  html+=`<div class="stat-row"><span class="stat-label">😰 壓力</span><div class="stat-track"><div class="stat-fill" style="width:${stress}%;background:${col2}"></div></div><span class="stat-val" style="color:${col2}">${stress}</span></div>`;
  html+=`<div class="stat-row"><span class="stat-label">🩹 傷病</span><div class="stat-track"><div class="stat-fill" style="width:${injuryRisk}%;background:${col3}"></div></div><span class="stat-val" style="color:${col3}">${injuryRisk}</span></div>`;
  html+=`<div class="stat-row"><span class="stat-label">📰 媒體</span><div class="stat-track"><div class="stat-fill" style="width:${media}%;background:${col4}"></div></div><span class="stat-val" style="color:${col4}">${media}</span></div>`;
  html+=`<div class="sect-divider">── 關係網 ──</div>`;
  for(const[k,m]of Object.entries(RELMETA)){
    const v=relations[k]||0;
    html+=`<div class="stat-row"><span class="stat-label">${m.l}</span><div class="stat-track"><div class="stat-fill" style="width:${Math.min(100,Math.max(0,v))}%;background:${m.c}"></div></div><span class="stat-val" style="color:${m.c}">${v}</span></div>`;
  }
  document.getElementById("stat-rows").innerHTML=html;
}

function renderHist(){
  const items=[];
  // Milestones
  if(milestones.length){
    items.push({type:"sect",text:"── 里程碑 ──"});
    for(const id of milestones){
      const def=MILESTONE_DEF.find(m=>m.id===id);
      if(def)items.push({type:"milestone",label:def.label,desc:def.desc});
    }
  }
  // Achievements
  if(achievements.length){
    items.push({type:"sect",text:"── 成就 ──"});
    for(const id of achievements){
      const def=ACH_DEF.find(a=>a.id===id);
      if(def)items.push({type:"achievement",label:def.icon+" "+def.label});
    }
  }
  // Recent headlines
  if(headlines.length){
    items.push({type:"sect",text:"── 近期新聞 ──"});
    for(const hl of headlines.slice(0,5))items.push({type:"headline",text:hl});
  }
  // Choice history
  if(history.filter(h=>h.choice).length){
    items.push({type:"sect",text:"── 選擇記錄 ──"});
    const choices=history.filter(h=>h.choice).reverse();
    for(const h of choices){
      items.push({type:"choice",round:h.round,choice:h.choice,deltas:h.deltas});
    }
  }

  if(!items.length){
    document.getElementById("hist-list").innerHTML=`<span style="font-size:12px;color:#475569">尚無記錄</span>`;
    return;
  }

  let html="";
  for(const it of items){
    if(it.type==="sect"){
      html+=`<div style="font-size:10px;color:#475569;margin:8px 0 5px;text-align:center;letter-spacing:1px">${it.text}</div>`;
    } else if(it.type==="milestone"){
      html+=`<div style="font-size:12px;margin-bottom:6px;padding:5px 8px;background:rgba(249,115,22,0.08);border-left:2px solid #f97316;border-radius:4px"><div style="font-weight:700;color:#f97316">${it.label}</div><div style="color:#64748b;font-size:11px">${it.desc}</div></div>`;
    } else if(it.type==="achievement"){
      html+=`<div style="display:inline-block;font-size:11px;font-weight:700;color:#fbbf24;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);border-radius:6px;padding:3px 8px;margin:2px">${it.label}</div>`;
    } else if(it.type==="headline"){
      html+=`<div style="font-size:11px;color:#7dd3fc;margin-bottom:4px;padding-left:6px;border-left:2px solid rgba(56,189,248,0.3)">📰 ${it.text}</div>`;
    } else if(it.type==="choice"){
      const dstr=it.deltas?Object.entries(it.deltas).map(([k,v])=>{const icon=k==="stamina"?"⚡":SMETA[k]?SMETA[k].l.split(" ")[0]:EMETA[k]?EMETA[k].l.split(" ")[0]:RELMETA[k]?RELMETA[k].l.split(" ")[0]:"";return`<span style="font-size:9px;color:${v>0?"#4ade80":"#f87171"}">${icon}${v>0?"+"+v:v}</span>`;}).join(""):"";
      html+=`<div style="font-size:12px;color:#64748b;margin-bottom:7px;border-left:2px solid rgba(249,115,22,0.25);padding-left:9px"><div style="color:#94a3b8;margin-bottom:3px">#${it.round} ${it.choice}</div><div style="display:flex;gap:3px;flex-wrap:wrap">${dstr}</div></div>`;
    }
  }
  document.getElementById("hist-list").innerHTML=html;
}

function toggleDrawer(w){
  if(w==="stats"){sOpen=!sOpen;hOpen=false;if(sOpen)renderStatRows();}
  else{hOpen=!hOpen;sOpen=false;if(hOpen)renderHist();}
  document.getElementById("drawer-stats").style.display=sOpen?"block":"none";
  document.getElementById("drawer-hist").style.display=hOpen?"block":"none";
  document.getElementById("btn-stats").className="hbtn"+(sOpen?" active":"");
  document.getElementById("btn-hist").className="hbtn"+(hOpen?" active":"");
}

function toggleFree(){
  freeOpen=!freeOpen;
  document.getElementById("free-row").className=freeOpen?"show":"";
  document.getElementById("free-toggle").textContent=freeOpen?"▲ 收起":"✏️ 自由輸入";
  if(freeOpen)setTimeout(()=>document.getElementById("free-input").focus(),50);
}

function showFloat(deltas){
  const fd=document.getElementById("floating-delta");
  const items=Object.entries(deltas).filter(([k])=>SMETA[k]||EMETA[k]||RELMETA[k]||k==="stamina");
  if(!items.length)return;
  fd.innerHTML=items.map(([k,v])=>{
    let icon,isGood;
    if(k==="stamina"){icon="⚡";isGood=v>0;}
    else if(EMETA[k]){icon=EMETA[k].l.split(" ")[0];isGood=(k==="media")?v>0:v<0;}
    else if(RELMETA[k]){icon=RELMETA[k].l.split(" ")[0];isGood=v>0;}
    else{icon=SMETA[k]?SMETA[k].l.split(" ")[0]:"";isGood=v>0;}
    return`<span style="font-size:12px;color:${isGood?"#4ade80":"#f87171"};background:rgba(2,6,23,0.9);border-radius:8px;padding:4px 12px;font-weight:700">${icon}${v>0?"+"+v:v}</span>`;
  }).join(" ");
  fd.style.display="flex";
  setTimeout(()=>{ fd.style.display="none"; },2000);
}
</script>
</body>
</html>
